<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ぽちゃるずレジ</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- =========================
         Header
    ========================== -->

    <header class="header">

        <div class="logo-area">

            <h1>☕ ぽちゃるずレジ</h1>

            <p>Pocharuzu Register</p>

        </div>

    </header>

    <!-- =========================
         Dashboard
    ========================== -->

    <section class="dashboard">

        <div class="card sales-card">

            <h2>本日の売上</h2>

            <p id="totalSales">¥0</p>

        </div>

        <div class="card count-card">

            <h2>販売数</h2>

            <p id="totalCount">0個</p>

        </div>

        <div class="card cash-card">

            <h2>現金</h2>

            <p id="cashSales">¥0</p>

        </div>

        <div class="card paypay-card">

            <h2>PayPay</h2>

            <p id="paypaySales">¥0</p>

        </div>

    </section>

    <!-- =========================
         Products
    ========================== -->

    <main class="products">

        <h2>商品一覧</h2>

        <div id="productList"></div>

    </main>

    <!-- =========================
         Footer
    ========================== -->

    <footer>

        <button id="resetButton">

            売上をリセット

        </button>

        <p class="copyright">

            © pocharuzu

        </p>

    </footer>

    <!-- JavaScript -->

    <script src="js/products.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
